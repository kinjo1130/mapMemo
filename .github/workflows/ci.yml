name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build
